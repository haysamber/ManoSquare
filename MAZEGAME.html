
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="MAZE.css">
  <title>Maze - Navigating Digital Trash</title>
</head>
<body>

<header class="topbar playing">
  <div class="nav-left">
    <button id="homeBtn" class="brand" type="button" title="Return to menu">ManoSquare Maze</button>
  </div>
  <div class="nav-right">
    <button id="fullscreenBtn" class="control-btn" type="button" title="Toggle fullscreen">⛶</button>
    <button id="closeBtn" class="control-btn" type="button" title="Exit game">×</button>
  </div>
</header>

<div id="loadingBar">
  <div id="loadingBarEmpty">
    <div id="loadingBarFull"></div>
  </div>
</div>
<div id="warningBanner"></div>

<div id="gameContainer">
  <div id="camera">
    <div id="world">
      <div id="topRow" class="row"></div>
      <div id="middleRow" class="row"></div>
      <div id="bottomRow" class="row"></div>
    </div>
    <div id="player"></div>
  </div>
</div>

<footer>
  <div id="buildTitle">Maze Collage</div>
</footer>

<script>
  const screenshotFiles = [
    'HorizontalWall2.png',
    'horizontalWall3.png',
    'horizontalWall4.png',
    'horizontalWall6.png',
    'horizontalWall7.png',
    'Screenshot 2026-02-26 164550.png',
    'Screenshot 2026-02-26 164602.png',
    'Screenshot 2026-03-05 171025.png',
    'Screenshot 2026-04-21 160319.png',
    'Screenshot 2026-04-30 002433.png',
    'Screenshot 2026-04-30 003937.png',
    'Screenshot 2026-04-30 005530.png',
    'Screenshot 2026-04-30 095832.png',
    'Screenshot 2026-04-30 095838.png',
    'Screenshot 2026-04-30 100032.png',
    'Screenshot 2026-04-30 100206.png',
    'Screenshot 2026-04-30 232622.png',
    'Screenshot 2026-04-30 232847.png',
    'Screenshot 2026-04-30 232901.png',
    'Screenshot 2026-04-30 233523.png',
    'Screenshot 2026-04-30 234222.png',
    'Screenshot 2026-04-30 234235.png',
    'Screenshot 2026-04-30 234307.png',
    'Screenshot 2026-04-30 234315.png',
    'Screenshot 2026-04-30 234831.png',
    'Screenshot 2026-04-30 234914.png',
    'Screenshot 2026-04-30 235822.png',
    'Screenshot 2026-05-01 003853.png',
    'Screenshot 2026-05-01 004345.png',
    'Screenshot 2026-05-01 004534.png',
    'Screenshot 2026-05-01 004823.png',
    'Screenshot 2026-05-01 004856.png',
    'Screenshot 2026-05-01 005644.png',
    'Screenshot 2026-05-01 005707.png',
    'Screenshot 2026-05-01 005805.png',
    'Screenshot 2026-05-01 005925.png',
    'Screenshot 2026-05-01 011254.png',
    'Screenshot 2026-05-01 011342.png',
    'Screenshot 2026-05-01 011458.png'
  ];

const camera = document.getElementById('camera');
const world = document.getElementById('world');
const player = document.getElementById('player');

let playerY = 200;
let playerX = 200;
const speed = 6;
const keys = {};

let obstacles = [];
let gameSpeed = 3;
let currentLane = 1;

let furthestObstacleX = 0;

const usedImages = [...screenshotFiles].sort(() => Math.random() - 0.5);
let imgIndex = 0;

function getNextImage() {
  const img = usedImages[imgIndex % usedImages.length];
  imgIndex++;
  return img;
}

function createObstacle(x, gapLane) {
 

  const lanesY = [
    60,
    camera.clientHeight / 2 - 100,
    camera.clientHeight - 220
  ];

  for (let lane = 0; lane < 3; lane++) {
    if (lane === gapLane) continue;

    const img = document.createElement('img');
    img.src = `MazeScreenshots/${encodeURI(getNextImage())}`;
    img.className = 'wallImage';

    img.style.position = 'absolute';
    img.style.left = x + 'px';
    img.style.top = lanesY[lane] + 'px';

    world.appendChild(img);


    img.onload = () => {
  obstacles.push({
    el: img,
    y: lanesY[lane],
    width: img.offsetWidth,
    height: img.offsetHeight
  });
};
  }

}

function loadLevel() {
  let x = 300;
  let currentLane = 1;

  screenshotFiles.forEach(() => {
    
    const change = Math.floor(Math.random() * 3) - 1;
    currentLane = Math.max(0, Math.min(2, currentLane + change));

    createObstacle(x, currentLane);

    x += 260;
  });
}

function isColliding(x, y) {
  const size = 36;

  const playerRect = {
    left: x,
    right: x + size,
    top: y,
    bottom: y + size
  };

  return obstacles.some(obs => {
    const rect = obs.el.getBoundingClientRect();
    const camRect = camera.getBoundingClientRect();

    const wall = {
      left: rect.left - camRect.left + playerX - camera.clientWidth / 2,
      right: rect.right - camRect.left + playerX - camera.clientWidth / 2,
      top: rect.top - camRect.top,
      bottom: rect.bottom - camRect.top
    };

    return !(
      playerRect.right < wall.left ||
      playerRect.left > wall.right ||
      playerRect.bottom < wall.top ||
      playerRect.top > wall.bottom
    );
  });
}

function gameLoop() {
  updatePlayer();
  updateCamera();
  requestAnimationFrame(gameLoop);
}

function updateCamera() {
  const center = camera.clientWidth / 2;

  player.style.left = center + 'px';
  const offsetX = -playerX + center;
  world.style.left = offsetX + 'px';
}

document.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
});

function updatePlayer() {
  let newX = playerX;
  let newY = playerY;

  if (keys['arrowleft'] || keys['a']) newX -= speed;
  if (keys['arrowright'] || keys['d']) newX += speed;
  if (keys['arrowup'] || keys['w']) newY -= speed;
  if (keys['arrowdown'] || keys['s']) newY += speed;

  newY = Math.max(0, Math.min(camera.clientHeight - 40, newY));

  if (!isColliding(newX, newY)) {
    playerX = newX;
    playerY = newY;
  }

  player.style.top = playerY + 'px';

}

loadLevel();
gameLoop();
</script>
</body>
</html>
