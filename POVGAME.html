<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="POV.css">
  <title> POV - Experience the Mess</title>
  <style>
    body {
      padding: 0;

    nav {
      position: relative;
      z-index: 10;
    }

    #roomImage {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }

    #instructions {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: white;
      font-family: Arial, sans-serif;
      text-shadow: 0 0 12px rgba(0,0,0,0.7);
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 16px;
      border-radius: 8px;
    }

    nav {
      position: relative;
      z-index: 10;
    }

    #overlayImage.hidden {
      display: none !important;
    }
  </style>
</head>
<body>
<img id="roomImage" src="RoomPictures/DigitalTrash.png" alt="Room">

  ];

  let currentImageIndex = 0;
  const roomImage = document.getElementById('roomImage');
  const overlayImage = document.getElementById('overlayImage');
  const instructions = document.getElementById('instructions');

  document.addEventListener('keydown', function(event) {
    if (event.code !== 'Space') {
      return;
    }

    event.preventDefault();

    if (currentImageIndex >= slides.length - 1) {
      return;
    }

    currentImageIndex += 1;
    roomImage.src = slides[currentImageIndex];

    if (currentImageIndex >= 7) {
      overlayImage.classList.remove('hidden');
    }
  });
</script>
