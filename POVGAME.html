  <style>
    body {
      padding: 0;
    }

    nav {
      position: relative;
      z-index: 10;
    }

    #roomImage {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }

    #instructions {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: white;
      font-family: Arial, sans-serif;
      text-shadow: 0 0 12px rgba(0,0,0,0.7);
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 16px;
      border-radius: 8px;
    }

    nav {
      position: relative;
      z-index: 10;
    }

    #typewriterText {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.85);
      color: white;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      padding: 15px 20px;
      border-radius: 4px;
      max-width: 400px;
      min-height: 50px;
      display: none;
      line-height: 1.4;
    }

    #typewriterText.visible {
      display: block;
    }

    #popupContainer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }

    #popupContainer img {
      position: absolute;
      max-width: 300px;
      max-height: 200px;
      transform: scale(1.5);
      transform-origin: top left;
      object-fit: contain;
      border: 2px solid #fff;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      cursor: pointer;
      pointer-events: auto;
    }
  </style>
</head>

  let currentImageIndex = 0;
  let autoAdvanceTimer = null;
  let typewriterInterval = null;
  const roomImage = document.getElementById('roomImage');
  const instructions = document.getElementById('instructions');
  const typewriterText = document.getElementById('typewriterText');
  const popupContainer = document.getElementById('popupContainer');

  function typeWriter(text, element, speed = 50) {
    if (typewriterInterval) {
      clearInterval(typewriterInterval);
    }
    
    element.textContent = '';
    element.classList.add('visible');
    
    let i = 0;
    typewriterInterval = setInterval(() => {
      if (i < text.length) {
        element.textContent += text.charAt(i);
        i++;
      } else {
        clearInterval(typewriterInterval);
        typewriterInterval = null;
      }
    }, speed);
  }

  function removeAllPopupsExcept(keepPath) {
    const popups = Array.from(popupContainer.querySelectorAll('img'));
    popups.forEach(img => {
      if (keepPath && img.src.includes(keepPath)) {
        return;
      }
      img.remove();
    });
  }

  function showSlideText() {
    const currentSlide = slides[currentImageIndex];
    
    if (slideText[currentSlide]) {
      typeWriter(slideText[currentSlide], typewriterText, 50);
    } else {
      typewriterText.classList.remove('visible');
      if (typewriterInterval) {
        clearInterval(typewriterInterval);
        typewriterInterval = null;
      }
    }

    if (currentSlide === 'BusPictures/Bus20.png') {
      removeAllPopupsExcept('PopUp/17.png');
    }

    if (currentSlide === 'End_1.png') {
      removeAllPopupsExcept();
    }

    const popupSrc = slidePopups[currentSlide];
    if (popupSrc) {
      showSlidePopup(popupSrc);
    }
  }

  function advanceSlide() {
    if (currentImageIndex >= slides.length - 1) {
      return;
    }

    currentImageIndex += 1;
    roomImage.src = slides[currentImageIndex];

    showSlideText();
    checkAutoAdvance();
  }

  function checkAutoAdvance() {
    if (autoAdvanceTimer) {
      clearTimeout(autoAdvanceTimer);
      autoAdvanceTimer = null;
    }

    const currentSlide = slides[currentImageIndex];
    
    if (autoPlaySlides.includes(currentSlide)) {
      autoAdvanceTimer = setTimeout(() => {
        advanceSlide();
      }, 1000);
    }
  }

  function createPopupImage(src) {
    const popupImg = document.createElement('img');
    popupImg.src = src;
    
    const effectiveWidth = 300 * 1.5;
    const effectiveHeight = 200 * 1.5;
    const maxX = Math.max(0, window.innerWidth - effectiveWidth - 20);
    const maxY = Math.max(0, window.innerHeight - effectiveHeight - 20);
    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;
    
    popupImg.style.left = randomX + 'px';
    popupImg.style.top = randomY + 'px';
    
    popupImg.onclick = function(event) {
      event.stopPropagation();
      popupImg.remove();
    };
    
    popupContainer.appendChild(popupImg);
  }

  function showSlidePopup(popupImageSrc) {
    createPopupImage(popupImageSrc);
  }

  document.addEventListener('keydown', function(event) {
    if (event.code !== 'Space') {
      return;
    }

    event.preventDefault();

    const currentSlide = slides[currentImageIndex];
    if (autoPlaySlides.includes(currentSlide) && autoAdvanceTimer) {
      return;
    }

    advanceSlide();
  });

  checkAutoAdvance();
  showSlideText();
